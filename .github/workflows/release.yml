name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run unit tests
        run: bun test tests/ascii.test.ts tests/bio.test.ts tests/cli.test.ts

      - name: Determine next version
        id: version
        run: |
          published=$(npm view @elephant_dev/w.is version 2>/dev/null || echo "0.0.0")
          major=$(echo "$published" | cut -d. -f1)
          next=$((major + 1))
          echo "tag=v$next.0.0" >> $GITHUB_OUTPUT
          echo "npm_ver=$next.0.0" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          node -e "
            const p = require('./package.json');
            p.version = '${{ steps.version.outputs.npm_ver }}';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - run: bun run build

      - name: Commit and tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "${{ steps.version.outputs.tag }}"
          git tag ${{ steps.version.outputs.tag }}

      - name: Publish to npm
        run: npm publish --access public

      - name: Publish to GitHub Packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "const p=require('./package.json'); p.name='@elephant-on-github/w.is'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "//npm.pkg.github.com/:_authToken=$GH_TOKEN" >> .npmrc
          npm publish --registry=https://npm.pkg.github.com/
          git checkout -- package.json

      - name: Push changes
        run: |
          git push
          git push --tags
